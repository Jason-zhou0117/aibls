<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP入场视频配置 - BiliMon</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" type="text/css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/vipconfig.css') }}" type="text/css">
    <script src="{{ url_for('static', filename='js/vipconfig.js') }}" ></script>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🎬</span>
                <span>BiliMon</span>
            </div>
            <div class="header-buttons">
                <button class="header-btn" onclick="showMessage('还没做这个功能！')">
                    <span>🎁</span> 礼物特效
                </button>
                <div class="user-info" id="userInfo"  onclick="headJs.openLogin()">
                    <div class="user-avatar" id="userAvatar"><img src="{{user_face|default('👤')}}" alt="头像"/></div>
                    <span class="user-name" id="userName">{{ nick_name|default('未登录') }}</span>
                </div>
            </div>
        </div>
    </div>

    <div class="main-container">
        <!-- 左侧面板 -->
        <div class="left-panel">
            <div class="panel-header">
                <span class="panel-title">🎬 VIP用户入场视频配置</span>
                <button class="toolbar-btn" id="addUserBtn" title="新增VIP用户配置">+</button>
            </div>
            <div class="user-list" id="userList">
                <div class="empty-tip">暂无VIP用户配置<br>点击 [+] 添加</div>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="right-panel">
            <div class="user-info-section">
                <div class="section-title">👤 用户信息</div>
                <div class="user-profile">
                    <div class="profile-avatar" id="profileAvatar">
                        <span style="font-size: 40px;">👤</span>
                    </div>
                    <div class="profile-info">
                        <div class="profile-name" id="profileName">未选择用户</div>
                        <div class="profile-uid" id="profileUid"></div>
                        <button class="select-user-btn"  id="selectUserBtn">🔍 更换用户</button>
                    </div>
                </div>
            </div>

            <div class="video-section">
                <div class="video-header">
                    <div class="section-title">🎬 入场视频列表</div>
                    <button class="toolbar-btn" id="addVideoBtn" title="新增入场视频">+</button>
                </div>
                <div class="video-list" id="videoList">
                    <div class="empty-tip">请先选择用户，然后添加视频</div>
                </div>
            </div>
        </div>
    </div>

    <script>
         init();
    </script>
</body>
</html>
