<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>欢迎视频播放器 - 竖屏版</title>
    <link rel="icon" href="https://www.bilibili.com/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: transparent;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* 竖屏视频容器 */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 100;
        }

        .video-container.show {
            display: block;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;  /* 铺满屏幕，可能裁剪边缘 */
            /* object-fit: contain;  完整显示，可能有黑边 */
            background: transparent;
        }

        /* 状态指示器 - 竖屏优化 */
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 20px;
            z-index: 1000;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        .status.connected {
            color: #4CAF50;
        }

        .status.disconnected {
            color: #f44336;
        }

        .status.playing {
            color: #FF9800;
            background: rgba(0,0,0,0.7);
        }
    </style>
    <script src="https://cdn.socket.io/4.5.1/socket.io.min.js"></script>
</head>
<body>
    <div class="video-container" id="videoContainer">
        <video id="welcomeVideo" autoplay>
            <source src="" type="video/mp4">
            <source src="" type="video/webm">
        </video>
    </div>
    <div class="status disconnected" id="status">⚫ 等待连接...</div>

    <script>
        // ==================== 视频播放队列管理器 ====================
        class VideoQueueManager {
            constructor(videoElement, containerElement, statusElement) {
            this.video = videoElement;
            this.container = containerElement;
            this.statusDiv = statusElement;
            this.queue = [];
            this.isPlaying = false;
            this.currentVideo = null;
            this.isEnding = false;  // 新增

            // 绑定 this 上下文
            this.boundOnVideoEnded = this.onVideoEnded.bind(this);
            this.boundOnError = (e) => {
                console.error('视频播放错误:', e);
                if (!this.isEnding) {
                    this.boundOnVideoEnded();
                }
            };

            this.video.addEventListener('ended', this.boundOnVideoEnded);
            this.video.addEventListener('error', this.boundOnError);
        }

            addVideo(videoUrl, userInfo) {
                const videoItem = {
                    url: videoUrl,
                    user: userInfo,
                    addedTime: new Date().toISOString()
                };

                this.queue.push(videoItem);
                console.log(`📋 视频已加入队列，当前队列长度: ${this.queue.length}`);

                if (!this.isPlaying) {
                    this.playNext();
                }
                this.updateStatusText();
            }

            playNext() {
                if (this.queue.length === 0) {
                    this.isPlaying = false;
                    this.currentVideo = null;
                    this.container.classList.remove('show');
                    console.log('✅ 队列已空');
                    this.updateStatusText();
                    return;
                }

                const nextVideo = this.queue.shift();
                this.currentVideo = nextVideo;
                this.isPlaying = true;

                console.log(`🎬 开始播放视频: ${nextVideo.url}, 剩余队列: ${this.queue.length}`);

                this.video.src = nextVideo.url;
                this.video.load();
                this.container.classList.add('show');

                const playPromise = this.video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.error('播放失败:', error);
                        this.onVideoEnded();
                    });
                }

                this.updateStatusText('playing', nextVideo);
            }

            onVideoEnded() {
                console.log('🏁 视频播放结束');

                // 防止重复调用
                if (this.isEnding) return;
                this.isEnding = true;

                // 移除事件监听，防止再次触发
                this.video.removeEventListener('ended', this.boundOnVideoEnded);
                this.video.removeEventListener('error', this.boundOnError);

                // 隐藏容器
                this.container.classList.remove('show');

                // 安全地清空视频源
                try {
                    this.video.pause();
                    this.video.src = '';
                    this.video.load();
                } catch (e) {
                    console.warn('清空视频源时出错:', e);
                }

                this.isPlaying = false;
                this.currentVideo = null;

                // 延迟后重新绑定并播放下一个
                setTimeout(() => {
                    this.video.addEventListener('ended', this.boundOnVideoEnded);
                    this.video.addEventListener('error', this.boundOnError);
                    this.isEnding = false;
                    this.playNext();
                }, 100);
            }

            updateStatusText(state = null, videoInfo = null) {
                if (this.isPlaying) {
                    this.statusDiv.innerHTML = `🎬 播放中 (队列: ${this.queue.length})`;
                    this.statusDiv.className = 'status playing';
                } else if (this.queue.length > 0 && !this.isPlaying) {
                    this.statusDiv.innerHTML = `⏳ 等待播放 (队列: ${this.queue.length})`;
                    this.statusDiv.className = 'status connected';
                } else {
                    this.statusDiv.innerHTML = `🟢 已连接，等待VIP入场...`;
                    this.statusDiv.className = 'status connected';
                }
            }

            getStatus() {
                return {
                    queueLength: this.queue.length,
                    isPlaying: this.isPlaying,
                    currentVideo: this.currentVideo
                };
            }
        }

        // ==================== 初始化 ====================
        const video = document.getElementById('welcomeVideo');
        const container = document.getElementById('videoContainer');
        const statusDiv = document.getElementById('status');

        const queueManager = new VideoQueueManager(video, container, statusDiv);

        const socket = io({
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: 10,
            reconnectionDelay: 1000
        });

        socket.on('connect', () => {
            console.log('✅ 视频播放器已连接到服务器');
            statusDiv.className = 'status connected';
            statusDiv.innerHTML = '🟢 已连接，等待VIP入场...';
        });

        socket.on('disconnect', () => {
            console.log('⚠️ 连接断开');
            statusDiv.className = 'status disconnected';
            statusDiv.innerHTML = '🔴 连接断开，尝试重连...';
        });

        socket.on('video_command', (data) => {
            console.log('🎬 收到视频播放指令:', data);
            if (data.action === 'play_video' && data.video_url) {
                queueManager.addVideo(data.video_url, {
                    uname: data.uname,
                    uid: data.uid
                });
            }
        });

        socket.on('reconnect', () => {
            console.log('✅ 重连成功');
            statusDiv.className = 'status connected';
            statusDiv.innerHTML = '🟢 已连接，等待VIP入场...';
        });

        window.debugVideoQueue = () => {
            console.log('队列状态:', queueManager.getStatus());
        };
    </script>
</body>
</html>
