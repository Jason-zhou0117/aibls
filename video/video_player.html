<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>欢迎视频播放器 - 竖屏版</title>
    <link rel="icon" href="https://www.bilibili.com/favicon.ico">
    <link rel="stylesheet" href="video_player.css">
</head>
<body>
    <div class="video-container" id="videoContainer">
        <video id="welcomeVideo" autoplay playsinline>
            <source src="" type="video/mp4">
            <source src="" type="video/webm">
            您的浏览器不支持 video 标签
        </video>
    </div>
    <div class="status disconnected" id="status">⚫ 等待连接...</div>

    <!-- 借鉴他的设计：用 object 控件监控服务状态，绕过 file:// 限制 -->
    <object id="serviceMonitor" data="about:blank" type="text/plain" style="visibility: hidden; width: 0; height: 0;"></object>

    <script src="video_player.js"></script>
</body>
</html>
